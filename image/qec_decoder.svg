<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100" fill="none" stroke="#1f2937" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Noisy input bits on the left (0, 1, 0 — middle is corrupted) -->
  <text x="6" y="32" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="700" fill="#1f2937" stroke="none">0</text>
  <text x="6" y="58" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="700" fill="#1f2937" stroke="none">1</text>
  <text x="6" y="84" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="700" fill="#1f2937" stroke="none">0</text>
  <!-- Strike-through marking the corrupted middle bit -->
  <line x1="4" y1="54" x2="18" y2="46" stroke="#dc2626" stroke-width="2"/>

  <!-- Arrows feeding in -->
  <path d="M22 28 L42 28"/><path d="M37 24 L42 28 L37 32"/>
  <path d="M22 54 L42 54"/><path d="M37 50 L42 54 L37 58"/>
  <path d="M22 80 L42 80"/><path d="M37 76 L42 80 L37 84"/>

  <!-- Black box decoder -->
  <rect x="44" y="18" width="52" height="68" rx="6"/>
  <circle cx="58" cy="40" r="2.5" fill="#1f2937" stroke="none"/>
  <circle cx="70" cy="52" r="2.5" fill="#1f2937" stroke="none"/>
  <circle cx="82" cy="40" r="2.5" fill="#1f2937" stroke="none"/>
  <circle cx="70" cy="68" r="2.5" fill="#1f2937" stroke="none"/>
  <line x1="58" y1="40" x2="70" y2="52"/>
  <line x1="82" y1="40" x2="70" y2="52"/>
  <line x1="70" y1="52" x2="70" y2="68"/>

  <!-- Arrows feeding out -->
  <path d="M98 28 L118 28"/><path d="M113 24 L118 28 L113 32"/>
  <path d="M98 54 L118 54"/><path d="M113 50 L118 54 L113 58"/>
  <path d="M98 80 L118 80"/><path d="M113 76 L118 80 L113 84"/>

  <!-- Corrected output bits (all 0s, since original message was 000) -->
  <text x="122" y="32" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="700" fill="#1f2937" stroke="none">0</text>
  <text x="122" y="58" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="700" fill="#1f2937" stroke="none">0</text>
  <text x="122" y="84" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="700" fill="#1f2937" stroke="none">0</text>
</svg>
